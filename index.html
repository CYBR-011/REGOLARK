<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>regolark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#07070a;font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 60%,rgba(0,180,220,0.05) 0%,transparent 55%),
    radial-gradient(ellipse at 70% 30%,rgba(140,0,200,0.05) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 90%,rgba(0,140,80,0.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
header{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:18px;}
.logo{
  font-family:'VT323',monospace;font-size:min(7rem,12vw);letter-spacing:12px;text-transform:uppercase;
  background:linear-gradient(90deg,#00f3ff 0%,#bf80ff 50%,#ff00ea 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(0,243,255,.45));animation:flicker 7s infinite alternate;
  line-height:1;margin-bottom:10px;
}
@keyframes flicker{
  0%,92%{filter:drop-shadow(0 0 12px rgba(0,243,255,.4));opacity:1}
  93%{opacity:.8}94%{opacity:1}97%{opacity:.88}
  100%{filter:drop-shadow(0 0 28px rgba(0,243,255,.7)) drop-shadow(0 0 50px rgba(191,128,255,.3));opacity:1}
}
nav{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;padding:10px 30px 10px;border-bottom:1px solid rgba(0,243,255,0.1);width:100%;}
nav a{
  font-family:'VT323',monospace;font-size:2.2rem;letter-spacing:3px;text-transform:uppercase;
  text-decoration:none;padding:2px 12px;border:1px solid transparent;border-radius:2px;
  transition:all .25s;white-space:nowrap;line-height:1.2;
}
nav a:nth-child(1){color:#00c8d4;border-color:rgba(0,200,212,.3);text-shadow:0 0 8px rgba(0,200,212,.7),0 0 20px rgba(0,200,212,.3)}
nav a:nth-child(2){color:#00c8d4;border-color:rgba(0,200,212,.3);text-shadow:0 0 8px rgba(0,200,212,.7),0 0 20px rgba(0,200,212,.3)}
nav a:nth-child(3){color:#c8a800;border-color:rgba(200,168,0,.3);text-shadow:0 0 8px rgba(200,168,0,.7),0 0 20px rgba(200,168,0,.3)}
nav a:nth-child(4){color:#c8a800;border-color:rgba(200,168,0,.3);text-shadow:0 0 8px rgba(200,168,0,.7),0 0 20px rgba(200,168,0,.3)}
nav a:nth-child(5){color:#c8a800;border-color:rgba(200,168,0,.3);text-shadow:0 0 8px rgba(200,168,0,.7),0 0 20px rgba(200,168,0,.3)}
nav a:nth-child(6){color:#00a854;border-color:rgba(0,168,84,.3);text-shadow:0 0 8px rgba(0,168,84,.7),0 0 20px rgba(0,168,84,.3)}
nav a:nth-child(7){color:#8a40d4;border-color:rgba(138,64,212,.3);text-shadow:0 0 8px rgba(138,64,212,.7),0 0 20px rgba(138,64,212,.3)}
nav a:nth-child(8){color:#c42020;border-color:rgba(196,32,32,.3);text-shadow:0 0 8px rgba(196,32,32,.7),0 0 20px rgba(196,32,32,.3)}
nav a:hover{background:rgba(255,255,255,.04);letter-spacing:5px;filter:brightness(1.6);opacity:1;}

/* app strip */
.apps{
  display:flex;justify-content:center;align-items:flex-start;
  flex-wrap:wrap;gap:14px 24px;
  padding:10px 20px 10px;
  border-bottom:1px solid rgba(255,0,234,0.08);
  position:relative;z-index:10;flex-shrink:0;
}
.app-item{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  text-decoration:none;cursor:pointer;transition:transform .25s,filter .25s;
}
.app-item:hover{transform:translateY(-4px) scale(1.08);}
.app-item:hover .app-icon{box-shadow:0 0 14px rgba(0,180,220,.6),0 0 28px rgba(140,0,200,.2);}
.app-item:hover .app-label{color:#a0e8f0;text-shadow:0 0 8px rgba(0,200,220,.8);}
.app-icon{
  width:50px;height:50px;border-radius:14px;object-fit:cover;
  border:1px solid rgba(0,180,220,.2);box-shadow:0 0 6px rgba(0,180,220,.1);
  transition:box-shadow .25s;
}
.app-label{
  font-family:'VT323',monospace;font-size:1rem;letter-spacing:2px;
  text-transform:uppercase;
  color:#00c8d4;
  text-shadow:0 0 8px rgba(0,200,212,.6),0 0 16px rgba(0,200,212,.25);
  text-align:center;
  line-height:1;transition:color .25s,text-shadow .25s;white-space:nowrap;
}

.layout{flex:1;display:flex;align-items:center;position:relative;z-index:1;overflow:hidden;}
.chibi{position:fixed;cursor:grab;user-select:none;z-index:20;transform-style:preserve-3d;will-change:transform;filter:drop-shadow(0 8px 24px rgba(0,180,220,0.2));}
.chibi:active{cursor:grabbing;}
.chibi canvas{display:block;pointer-events:none;}
#arrowCanvas{position:fixed;inset:0;pointer-events:none;z-index:50;}



footer{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:.55rem;letter-spacing:3px;color:rgba(255,255,255,.08);text-transform:uppercase;z-index:10;}

/* ── RESPONSIVE MOBILE ── */
@media(max-width:600px){
  .logo{font-size:min(4.5rem,16vw);letter-spacing:6px;margin-bottom:6px;}
  nav{gap:4px 8px;padding:6px 10px 8px;}
  nav a{font-size:1.4rem;letter-spacing:1px;padding:1px 7px;}
  .apps{gap:10px 14px;padding:8px 10px;}
  .app-icon{width:40px;height:40px;border-radius:10px;}
  .app-label{font-size:.85rem;letter-spacing:1px;}
  .chibi canvas{max-width:130px !important;max-height:38vh !important;}
}
@media(max-width:380px){
  .logo{font-size:min(3.5rem,14vw);letter-spacing:4px;}
  nav a{font-size:1.2rem;}
  .app-icon{width:34px;height:34px;}
}
</style>
</head>

function loadChar(canvas,mirror){
  const img=new Image();
  img.onload=()=>{
    const isMobile=window.innerWidth<=600;
    const maxW=isMobile?130:220;
    const maxH=Math.round(window.innerHeight*(isMobile?0.38:0.55));
    const scale=Math.min(maxW/img.width,maxH/img.height);
    canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
    const ctx=canvas.getContext("2d");
    if(mirror){ctx.translate(canvas.width,0);ctx.scale(-1,1);}
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const id=ctx.getImageData(0,0,canvas.width,canvas.height);const d=id.data;
    for(let i=0;i<d.length;i+=4){const br=(d[i]+d[i+1]+d[i+2])/3;if(br<40)d[i+3]=Math.round((br/40)*d[i+3]);}
    ctx.putImageData(id,0,0);
  };
  img.src="data:image/png;base64,"+B64;
}
loadChar(document.getElementById("cvL"),true);
loadChar(document.getElementById("cvR"),false);

// set initial positions responsively
(function positionChibis(){
  const m=window.innerWidth<=600;
  const gap=m?8:60;
  const bot=m?40:80;
  const elL=document.getElementById("chibiL");
  const elR=document.getElementById("chibiR");
  elL.style.left=gap+"px";
  elL.style.bottom=bot+"px";
  elR.style.right=gap+"px";
  elR.style.bottom=bot+"px";
})();

let rawMx=window.innerWidth/2,rawMy=window.innerHeight/2,smMx=rawMx,smMy=rawMy;
document.addEventListener("mousemove",e=>{rawMx=e.clientX;rawMy=e.clientY;});
document.addEventListener("touchmove",e=>{rawMx=e.touches[0].clientX;rawMy=e.touches[0].clientY;},{passive:true});

function makeDraggable(el){
  let dragging=false,ox=0,oy=0;
  function start(cx,cy){
    dragging=true;
    const r=el.getBoundingClientRect();
    ox=cx-r.left;oy=cy-r.top;
    el.style.cursor="grabbing";
    // always convert to top/left positioning so it stays after drop
    el.style.left=r.left+"px";
    el.style.top=r.top+"px";
    el.style.right="";
    el.style.bottom="";
  }
  function move(cx,cy){if(!dragging)return;el.style.left=(cx-ox)+"px";el.style.top=(cy-oy)+"px";}
  function end(){dragging=false;el.style.cursor="grab";}
  el.addEventListener("mousedown",e=>{e.preventDefault();start(e.clientX,e.clientY);});
  window.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
  window.addEventListener("mouseup",end);
  el.addEventListener("touchstart",e=>{e.preventDefault();start(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  window.addEventListener("touchend",end);
}
makeDraggable(document.getElementById("chibiL"));
makeDraggable(document.getElementById("chibiR"));

const aimState={chibiL:{angle:0,bob:0},chibiR:{angle:0,bob:0}};

function updateAim(ts){
  smMx+=(rawMx-smMx)*0.12;smMy+=(rawMy-smMy)*0.12;
  const bob=Math.sin(ts/1500*Math.PI)*8;
  ["chibiL","chibiR"].forEach(id=>{
    const el=document.getElementById(id);const r=el.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=smMx-cx,dy=smMy-cy;
    // full 360: angle to cursor in degrees
    // cvL naturally faces RIGHT (0deg), cvR naturally faces LEFT (180deg offset)
    const baseAngle=id==="chibiR"?180:0;
    const angle=(Math.atan2(dy,dx)*(180/Math.PI))-baseAngle;
    aimState[id]={angle,bob};
    el.style.transform=`rotate(${angle}deg) translateY(${bob}px)`;
  });
  requestAnimationFrame(updateAim);
}
updateAim(0);

const ac=document.getElementById("arrowCanvas");const ax=ac.getContext("2d");let arrows=[];
function resize(){ac.width=window.innerWidth;ac.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);

function bowTip(id){
  const el=document.getElementById(id);const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  // arrow fires at the exact angle toward cursor
  const angle=Math.atan2(smMy-cy,smMx-cx);
  const reach=r.width*0.44;
  return{x:cx+Math.cos(angle)*reach, y:cy+Math.sin(angle)*reach};
}

// muzzle bursts drawn at shoot origin
let bursts=[];

let lastShot=0;
function maybeShoot(ts){
  if(ts-lastShot>400){lastShot=ts;
    ["chibiL","chibiR"].forEach((id,i)=>{
      setTimeout(()=>{
        const from=bowTip(id);
        const dist=Math.hypot(smMx-from.x,smMy-from.y);
        const spd=56;
        const angle=Math.atan2(smMy-from.y,smMx-from.x);
        // spawn arrow starting exactly at bow flame tip
        arrows.push({
          x:from.x, y:from.y,
          vx:(smMx-from.x)/dist*spd,
          vy:(smMy-from.y)/dist*spd,
          life:Math.ceil(dist/spd)+6,
          max:Math.ceil(dist/spd)+6,
          angle
        });
        // muzzle burst at bow tip
        bursts.push({x:from.x, y:from.y, angle, life:10, max:10});
      },i*200);
    });
  }
}

function drawBurst(b){
  const p=b.life/b.max;
  ax.save();ax.globalAlpha=p;ax.translate(b.x,b.y);ax.rotate(b.angle);
  for(let i=0;i<8;i++){
    const a=((Math.PI*2)/8)*i;
    const len=(1-p)*18+4;
    ax.strokeStyle=`rgba(255,${180+Math.random()*75},30,${p})`;
    ax.lineWidth=1.5;
    ax.beginPath();
    ax.moveTo(Math.cos(a)*4,Math.sin(a)*4);
    ax.lineTo(Math.cos(a)*len,Math.sin(a)*len);
    ax.stroke();
  }
  // central flash
  const rg=ax.createRadialGradient(0,0,0,0,0,12*(1-p)+4);
  rg.addColorStop(0,"rgba(255,240,120,0.9)");
  rg.addColorStop(1,"rgba(255,80,0,0)");
  ax.fillStyle=rg;ax.beginPath();ax.arc(0,0,12*(1-p)+4,0,Math.PI*2);ax.fill();
  ax.restore();
}

function drawArrow(a){
  const fo=a.life<8?a.life/8:1;
  ax.save();ax.globalAlpha=Math.min(1,a.life/Math.min(a.max,12))*fo;
  ax.translate(a.x,a.y);ax.rotate(a.angle);
  // warm trail
  const tg=ax.createLinearGradient(-32,0,-2,0);
  tg.addColorStop(0,"rgba(255,80,0,0)");tg.addColorStop(1,"rgba(255,160,30,.35)");
  ax.strokeStyle=tg;ax.lineWidth=6;ax.beginPath();ax.moveTo(-32,0);ax.lineTo(-2,0);ax.stroke();
  // shaft
  ax.strokeStyle="#c8a050";ax.lineWidth=2;ax.beginPath();ax.moveTo(-22,0);ax.lineTo(10,0);ax.stroke();
  // arrowhead
  ax.fillStyle="#ffe080";ax.beginPath();ax.moveTo(18,0);ax.lineTo(8,-4);ax.lineTo(8,4);ax.closePath();ax.fill();
  // flame tip
  const fg=ax.createRadialGradient(22,0,0,22,0,12);
  fg.addColorStop(0,"rgba(255,245,100,1)");
  fg.addColorStop(0.3,"rgba(255,110,10,.95)");
  fg.addColorStop(1,"rgba(200,0,0,0)");
  ax.fillStyle=fg;ax.beginPath();ax.ellipse(22,0,12,6,0,0,Math.PI*2);ax.fill();
  // sparks
  for(let s=0;s<3;s++){
    if(Math.random()>.4){
      ax.fillStyle="rgba(255,220,60,.85)";
      ax.beginPath();ax.arc(22+Math.random()*12-4,Math.random()*8-4,Math.random()*2.5,0,Math.PI*2);ax.fill();
    }
  }
  // feathers
  ax.strokeStyle="rgba(0,210,240,.8)";ax.lineWidth=1.4;
  ax.beginPath();ax.moveTo(-22,-6);ax.lineTo(-13,0);ax.moveTo(-22,6);ax.lineTo(-13,0);ax.stroke();
  ax.restore();
}

function loop(ts){
  ac.width=ac.width;maybeShoot(ts);
  for(let i=bursts.length-1;i>=0;i--){const b=bursts[i];b.life--;if(b.life<=0){bursts.splice(i,1);continue;}drawBurst(b);}
  for(let i=arrows.length-1;i>=0;i--){const a=arrows[i];a.x+=a.vx;a.y+=a.vy;a.life--;if(a.life<=0){arrows.splice(i,1);continue;}drawArrow(a);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

<script>
const audio=document.getElementById("bgMusic");
// boost to 150% using Web Audio API GainNode
const actx=new(window.AudioContext||window.webkitAudioContext)();
const src=actx.createMediaElementSource(audio);
const gain=actx.createGain();
gain.gain.value=1.5;
src.connect(gain);gain.connect(actx.destination);
audio.volume=1.0;
function tryAutoplay(){
  audio.play().catch(()=>{
    document.addEventListener("click",function autoplay(){
      audio.play();
      document.removeEventListener("click",autoplay);
    },{once:true});
  });
}
tryAutoplay();
</script>
